<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent Thinking 101 course hero</title>
  <desc id="desc">A clean course hero showing a person turning ideas into tasks, tools, feedback, and finished works with an AI agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ed"/>
      <stop offset="0.45" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#f4f0fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#16202a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(100 88)">
    <text x="0" y="70" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="74" font-weight="800" fill="#17212b">和 AI Agent 一起做事</text>
    <text x="0" y="124" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#53606c">从“问 AI”到“指挥 AI 完成任务”</text>
  </g>
  <g filter="url(#softShadow)" transform="translate(100 230)">
    <rect x="0" y="0" width="430" height="470" rx="28" fill="#ffffff"/>
    <text x="38" y="62" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#17212b">普通 AI 使用</text>
    <g transform="translate(38 98)">
      <rect width="354" height="64" rx="18" fill="#f0f3f6"/>
      <text x="24" y="40" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#52606b">帮我改一段文字</text>
    </g>
    <g transform="translate(38 184)">
      <rect width="300" height="64" rx="18" fill="#f0f3f6"/>
      <text x="24" y="40" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#52606b">帮我写个标题</text>
    </g>
    <g transform="translate(38 270)">
      <rect width="330" height="64" rx="18" fill="#f0f3f6"/>
      <text x="24" y="40" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#52606b">总结这篇文章</text>
    </g>
    <text x="38" y="410" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" fill="#6a7682">问一句，答一句</text>
  </g>
  <g transform="translate(600 455)">
    <path d="M0 0 C90 -52 170 -52 260 0" fill="none" stroke="#1f7a8c" stroke-width="10" stroke-linecap="round"/>
    <path d="M252 -48 L310 0 L252 48" fill="none" stroke="#1f7a8c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#softShadow)" transform="translate(930 195)">
    <rect x="0" y="0" width="470" height="540" rx="30" fill="#ffffff"/>
    <text x="38" y="62" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#17212b">Agent 思维</text>
    <g transform="translate(52 100)">
      <circle cx="50" cy="50" r="50" fill="#e8f4f2"/>
      <text x="50" y="58" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#1f7a8c">目标</text>
    </g>
    <g transform="translate(245 100)">
      <circle cx="50" cy="50" r="50" fill="#fff1df"/>
      <text x="50" y="58" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#a65f00">工具</text>
    </g>
    <g transform="translate(52 250)">
      <circle cx="50" cy="50" r="50" fill="#eef0ff"/>
      <text x="50" y="58" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#5452a3">反馈</text>
    </g>
    <g transform="translate(245 250)">
      <circle cx="50" cy="50" r="50" fill="#f4ebf8"/>
      <text x="50" y="58" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#7a4b8f">作品</text>
    </g>
    <text x="38" y="448" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" fill="#52606b">说清楚目标，拆成步骤，</text>
    <text x="38" y="484" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" fill="#52606b">让 AI 用工具执行，再由人检查。</text>
  </g>
  <g transform="translate(100 790)">
    <rect width="1400" height="2" fill="#d8dde2"/>
    <text x="0" y="50" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#53606c">Agent Thinking 101 · 面向青少年、成年人、家长老师和效率工具用户</text>
  </g>
</svg>
