<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Thinking 101 | Handbook</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header" aria-label="Handbook 导航">
        <div class="header-inner">
          <div class="brand-block">
            <div class="brand-mark">AT</div>
            <div class="brand-copy">
              <h1>Agent Thinking 101</h1>
              <p>和 AI Agent 一起做事</p>
            </div>
          </div>

          <nav class="doc-list" id="docList" aria-label="文档列表"></nav>
          <button
            class="nav-toggle"
            id="navToggle"
            type="button"
            aria-expanded="false"
            aria-controls="docList"
            aria-label="展开文档导航"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>

      <main class="main-panel">
        <section class="content-layout">
          <article class="reader-card">
            <div class="reader-toolbar">
              <div>
                <p class="eyebrow" id="currentKind">课程文档</p>
                <h3 id="currentTitle">加载中...</h3>
              </div>
              <label class="search-box">
                <span>搜索</span>
                <input id="searchInput" type="search" placeholder="输入关键词过滤当前文档" />
              </label>
            </div>
            <div class="doc-content" id="docContent" aria-live="polite"></div>
          </article>

          <aside class="toc-card" aria-label="当前文档章节">
            <p class="eyebrow">章节目录</p>
            <div id="toc"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
