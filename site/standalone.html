:root {

    <script>
window.__EMBEDDED_DOCS__ = {"course":"# Agent Thinking 101\n\n## 和 AI Agent 一起做事\n\n我最初想做的是少儿编程课。写着写着，我发现成年人也卡在同一个地方：工具已经装了，聊天也会了，可一碰到完整任务，还是不知道怎样把 AI 放进自己的工作里。\n\n于是课程范围慢慢变宽了。孩子可以做网页、小游戏和学习助手；成年人可以整理 Excel、写文档或搭小工具。会编程的人还能继续往 Codex、MCP 和 skills 走。大家用的功能不一样，但开头都一样：先把想做的事说清楚。\n\n## 写在前面：这门课到底想解决什么\n\n我身边不少朋友已经在用 ChatGPT、Gemini、豆包或 DeepSeek。平时改改文字、写个标题、翻译几句话，都没有问题。\n\n可我教他们用 Codex 时，经常会看到一种断层。他们会问一段代码是什么意思，却很少让 AI 先读完整个项目；会让 AI 写攻略，却不让它先问预算、同行人和旅行节奏。大家仍然习惯一句一句地下命令，好像 AI 只能在聊天框里活动。\n\n现在的 Agent 可以读文件、改代码、跑命令，也能根据报错继续修。表格、文档和浏览器里的任务也在往这个方向走。它不保证一次做对，但已经可以连续承担一段工作。\n\n这门课想练的是下面这些事：\n\n- 怎么把一个模糊想法说清楚。\n- 怎么让 AI 帮你拆任务，而不是只给答案。\n- 怎么让 AI 用工具做事，而不是只在聊天框里写字。\n- 怎么检查 AI 的结果，避免被它带着跑。\n- 怎么把重复工作沉淀成模板、skill 或自动化流程。\n- 怎么用 AI 学习、创作、工作、复盘自己。\n\n学完以后，至少应该能把一件事情交代完整，知道什么时候让 AI 继续，什么时候自己停下来检查。\n\n## 参考资料和调研结论\n\n公开的 Agent 教程不少，大多写给开发者。\n\nHugging Face 的 Agents Course 会讲工具、行动和观察，也带着学习者用 smolagents、LlamaIndex、LangGraph 做项目。内容完整，不过默认读者有 Python 基础。\n\nMicrosoft 的 AI Agents for Beginners 更接近工程课程，内容包括规划、记忆、多 Agent、RAG 和 MCP。想自己开发 Agent 的人会用得上，普通用户读起来会比较吃力。\n\nAnthropic 的 Building Effective Agents 提醒开发者别急着做全自动系统，很多任务用简单工作流更稳。文章列出的提示链、路由、并行和评审流程，也很适合拿来教普通人。\n\nOpenAI 和通义灵码的文档则把工具列得很具体：搜索、文件、代码执行、终端、MCP、computer use。模型能接触这些工具以后，才有机会把任务往下推进。\n\n我不想把这门课也写成框架手册。所以正文会先从旅行计划、照片工具、学习和表格这些场景讲起。等读者真的遇到“AI 需要读文件”或“这套流程想下次再用”的问题，再解释工具、记忆、MCP 和 skill。\n\n参考资料：\n\n- Hugging Face Agents Course: https://huggingface.co/learn/agents-course/unit0/introduction\n- Anthropic, Building Effective Agents: https://www.anthropic.com/engineering/building-effective-agents\n- Microsoft AI Agents for Beginners: https://github.com/microsoft/ai-agents-for-beginners\n- OpenAI Agents SDK docs: https://developers.openai.com/api/docs/guides/agents\n- OpenAI tools docs: https://developers.openai.com/api/docs/guides/tools\n- 通义灵码智能体模式: https://help.aliyun.com/zh/lingma/qoder-cn/user-guide/agent\n- UNESCO AI Competency Framework for Students: https://www.unesco.org/en/articles/ai-competency-framework-students\n- MIT Open Learning, AI Literacy, Explained: https://openlearning.mit.edu/news/ai-literacy-explained\n\n## 课程使用指南\n\n自学时，可以从头读到尾，每章做一次练习。别只收藏 prompt，最好当场打开一个 AI 工具试一遍，然后故意挑一处不满意的地方让它修改。\n\n给朋友试讲时，不必一次讲完十章。先用半小时比较聊天与 Agent 的差别，再用一小时做个人主页或旅行计划，已经足够看出这套课是否讲得通。\n\n正式开课可以做 4 节体验版，也可以拆成 10 节。前者用来测试内容，后者再加入作业、复盘和最终项目。\n\n### 四节体验课版本\n\n第 1 节：AI 不只是聊天机器人。  \n目标是让学习者理解：AI 不只是回答问题，还可以围绕目标做事。课堂上对比“帮我做网页”和“请先帮我拆需求，再生成网页”的差别。\n\n第 2 节：把想法说清楚。  \n目标是训练任务说明。学习者选择一个真实想法，写出目标、背景、对象、材料、约束和成功标准。\n\n第 3 节：做出第一个作品。  \n目标是体验从想法到作品。青少年可以做兴趣主页，成年人可以做旅行计划页面、照片工具或工作流模板。\n\n第 4 节：让 AI 成为长期助手。  \n目标是写出自己的 AI 使用手册，包括偏好、常做任务、检查标准和可以沉淀成 skill 的重复工作。\n\n### 十节系统课版本\n\n第 1 节：从聊天 AI 到 Agent。  \n第 2 节：任务说明和需求澄清。  \n第 3 节：先计划、再执行、再检查。  \n第 4 节：工具、上下文、记忆和 skill。  \n第 5 节：用 AI 学习学校科目和兴趣技能。  \n第 6 节：用 AI 创造网页、小工具和作品。  \n第 7 节：用 AI 处理成年人工作流。  \n第 8 节：Agent 工作流模式。  \n第 9 节：安全、边界和判断。  \n第 10 节：最终项目展示和复盘。\n\n### 这门课反复练什么\n\n术语记不住没关系。每一章都会回到这五件事：\n\n1. 我能不能把目标说清楚。\n2. 我能不能让 AI 先问问题。\n3. 我能不能让 AI 拆计划。\n4. 我能不能检查 AI 做得对不对。\n5. 我能不能把一次经验沉淀成以后可复用的流程。\n\n这五件事做顺了，换一个模型也不至于重新学起。\n\n## 第一章：AI 不只是聊天机器人\n\n### 1.1 过去我们怎么用 AI\n\n很多人第一次用 AI，会把它当成一个很聪明的聊天对象。\n\n比如：\n\n- “帮我润色这段话。”\n- “帮我写一份自我介绍。”\n- “这段英文是什么意思？”\n- “帮我总结这篇文章。”\n- “给我十个小红书标题。”\n\n这些用法很实用，只是范围比较窄。你给一段材料，它回一个结果；不满意，再追问一句。AI 不知道整件事为什么要做，也接触不到其他文件和工具。\n\n### 1.2 Agent 是什么\n\n“Agent”听起来有点玄。先把它理解成：\n\n> 一个能围绕目标，使用工具，持续推进任务的 AI 协作者。\n\n聊天 AI 主要给回答。Agent 还会拿工具往下做。\n\n一个普通聊天 AI 可以告诉你：“这个网页应该怎么写。”  \n一个 Coding Agent 可以真的帮你写文件、改样式、运行项目、看报错、继续修。\n\n一个普通聊天 AI 可以告诉你：“Excel 里可以用这个公式。”  \n一个 Agent 可以读取表格，检查字段，生成公式，跑一段分析，输出图表和报告草稿。\n\n一个普通聊天 AI 可以告诉你：“旅行计划可以这样安排。”  \n一个 Agent 可以先问你的偏好，查最新信息，生成路线，发现时间太赶后重新排，再把最终计划做成清单。\n\n这里比较的是工作方式，不是模型智商。\n\n### 1.3 Agent 的四个关键词\n\n先看目标。它可以很小，比如做一个照片浏览器；也可以是整理过去一年的博客，看看自己总在写什么。\n\n再看上下文。需求、偏好、项目文件和之前的决定都算上下文。材料不给够，AI 只能猜。\n\n工具决定它能不能动手。搜索、文件、浏览器、表格、终端和你自己的脚本，都可以成为工具。\n\n最后是反馈。代码报错就看报错，页面太挤就改排版。人也要把“不对劲”说出来，不然 AI 只会沿着第一版继续跑。\n\n### 1.4 一个小例子：从聊天到 Agent\n\n普通用法：\n\n```text\n帮我做一个个人主页。\n```\n\nAI 可能会给你一段 HTML，或者告诉你个人主页应该包含哪些部分。\n\nAgent 式用法：\n\n```text\n我想做一个个人主页，用来展示我的摄影作品和最近写的文章。\n目标用户是朋友和未来可能合作的人。\n我希望页面有：自我介绍、照片作品区、博客链接、联系方式。\n风格不要太花，干净一点，有一点杂志感。\n请先帮我拆需求，问我还缺哪些信息，然后给出一个实现计划。\n等我确认后，再开始生成第一版。\n```\n\n这个 prompt 没有秘诀，只是多给了背景，还要求 AI 先停下来问问题。\n\n### 1.5 本章练习\n\n找一个你最近真的想做的事情，写成两个版本。\n\n第一个版本用普通聊天方式：\n\n```text\n帮我……\n```\n\n第二个版本用 Agent 方式：\n\n```text\n我想完成……\n背景是……\n目标用户/使用场景是……\n我已有的材料是……\n限制条件是……\n怎样算做好……\n请先问我缺少的信息，再给我计划。\n```\n\n比较两次回答，记下第二次多问了什么、少猜了什么。这个差别比背模板更值得留意。\n\n## 第二章：把想法说清楚\n\n### 2.1 大多数人卡在“想法太糊”\n\n很多让人失望的回答，源头是任务太糊。\n\n比如：\n\n```text\n帮我写个方案。\n```\n\n什么方案？给谁看？目的是说服、汇报、执行，还是招生？要多长？语气要正式还是轻松？有没有已有资料？有没有必须避开的内容？怎样算好？\n\n如果这些都没说，AI 只能猜。\n\n人和人一起工作也是这样。你对朋友说“帮我弄一下”，朋友也会愣住。AI 只是把这个问题放大了。\n\n### 2.2 一个任务说明的六个部分\n\n写任务说明时，可以顺着六个问题想：要做什么，为什么做，给谁用，手上有什么，受哪些限制，怎样才算完成。\n\n不必每次写成正式表格。比如你想做旅行计划，预算和同行人就是限制；想写工作报告，读者和已有数据更要先交代。少了哪一项，AI 就会自己补空白，而且它补的未必合你心意。\n\n### 2.3 模板：把模糊想法变清楚\n\n可以用这个模板：\n\n```text\n我想完成：\n\n背景是：\n\n这个东西给谁用/给谁看：\n\n我已有的材料：\n\n限制条件：\n\n我希望最后输出：\n\n怎样算做好：\n\n请你先检查我的描述是否清楚。如果不清楚，先问我问题，不要急着开始做。\n```\n\n网页、旅行计划、Excel 和课程大纲都能用这套模板。用几次后，可以删掉那些你不需要的栏目。\n\n### 2.4 青少年例子：做一个兴趣主页\n\n普通说法：\n\n```text\n帮我做一个关于篮球的网页。\n```\n\n更好的说法：\n\n```text\n我想做一个篮球兴趣主页，用来展示我为什么喜欢篮球。\n这个网页主要给同学和家长看。\n内容包括：我喜欢的球星、我最近的训练记录、我想学习的技术动作、我最喜欢的一场比赛。\n我现在没有学过 HTML，只想先做一个简单但好看的网页。\n风格希望有运动感，但不要太乱。\n怎样算做好：打开网页后，别人能在 1 分钟内了解我的篮球兴趣，并且页面看起来不像作业。\n请先帮我拆页面结构，再问我还需要补充什么。\n```\n\n这段描述也在逼着孩子整理自己的想法：网页里到底要放什么，别人看完应该知道什么。\n\n### 2.5 成年人例子：处理 Excel\n\n普通说法：\n\n```text\n帮我分析这个表格。\n```\n\n更好的说法：\n\n```text\n我有一份销售数据表，想知道最近三个月不同产品线的销售表现。\n目标是给老板做一个简单汇报。\n我希望输出包括：总体趋势、表现最好的产品、下滑明显的产品、可能原因、下一步建议。\n请先检查表格字段是否足够。如果字段不够，请告诉我缺什么。\n分析时不要只给结论，也要说明你是根据哪些字段判断的。\n最后请输出一份适合放进汇报文档的摘要。\n```\n\n有了业务目标和检查要求，AI 才知道该分析哪些字段，而不是随便画几张图。\n\n### 2.6 本章练习\n\n选一个你自己的真实任务，写一份任务说明。\n\n可以从这些方向选：\n\n- 做一个个人主页。\n- 设计一次旅行。\n- 学一个新技能。\n- 整理一个表格。\n- 写一份报告。\n- 做一个小工具。\n- 复盘自己过去一年的经历。\n\n写完后，让 AI 帮你检查这份任务说明：\n\n```text\n请你帮我检查这个任务说明。\n哪些地方清楚？哪些地方不够清楚？\n如果你要执行这个任务，你还需要问我哪 5 个问题？\n```\n\n如果 AI 提不出问题，通常说明任务还停在泛泛而谈的层面。\n\n## 第三章：从“要答案”到“要过程”\n\n### 3.1 为什么不要急着要最终答案\n\n很多人用 AI，会直接要结果。\n\n比如：\n\n```text\n帮我写完这篇作文。\n```\n\n```text\n帮我直接生成完整代码。\n```\n\n```text\n帮我给出投资建议。\n```\n\n直接拿最终答案当然省事，可你很难判断它在哪一步走偏了。写代码、做数据或学习新东西时，这个问题尤其明显。\n\n可以先让 AI 复述任务、问几个问题，再列计划。你看过计划以后再让它动手，出错时也比较容易找到位置。\n\n### 3.2 一个好流程：先计划，再执行\n\n很多任务都可以用这个流程：\n\n1. 说明目标。\n2. 让 AI 复述理解。\n3. 让 AI 提问补充信息。\n4. 让 AI 给出计划。\n5. 人确认计划。\n6. AI 执行第一步。\n7. 人检查结果。\n8. AI 继续修改。\n9. 最后总结经验。\n\n前面多花几分钟，往往能省掉后面整段推倒重来的时间。\n\n### 3.3 让 AI 先问你问题\n\n一个非常简单但有效的句子是：\n\n```text\n如果我的描述还不够清楚，请先问我问题，不要急着给答案。\n```\n\n这句话的作用很朴素：先把缺的信息补上。\n\n比如你说：\n\n```text\n我想学摄影，请帮我制定学习计划。如果我的目标不清楚，请先问我问题。\n```\n\nAI 可能会问：\n\n- 你现在用什么设备？\n- 你更喜欢人像、街拍、风景还是静物？\n- 你每周能练习几次？\n- 你想先学拍摄，还是后期？\n- 你希望一个月后达到什么效果？\n\n回答完这些问题，“学摄影”才会变成一份适合你的练习安排。\n\n### 3.4 让 AI 暴露检查方法\n\n另一个好句子是：\n\n```text\n每一步完成后，请告诉我应该怎么检查结果。\n```\n\n比如写网页，检查方法可以是：\n\n- 页面能不能打开。\n- 文字有没有溢出。\n- 手机上是否能看。\n- 图片是否正常加载。\n- 按钮点击后有没有反应。\n\n比如处理 Excel，检查方法可以是：\n\n- 总数是否和原表一致。\n- 是否有空值或异常值。\n- 分组字段是否正确。\n- 公式是否覆盖所有行。\n- 结论是否符合业务常识。\n\n检查方法最好在执行前就说好。等结果出来再临时找标准，很容易被一份看起来漂亮的答案糊弄过去。\n\n### 3.5 本章练习\n\n找一个你想让 AI 帮你完成的任务，要求 AI 按下面格式工作：\n\n```text\n请按这个流程帮我：\n1. 先复述你理解的目标。\n2. 再问我 3 到 5 个必要问题。\n3. 然后给出执行计划。\n4. 等我确认后，只执行第一步。\n5. 每一步结束后告诉我怎么检查。\n```\n\n做完后，看看 AI 的计划有没有帮你发现原来没想到的问题。\n\n## 第四章：工具、上下文和记忆\n\n### 4.1 Agent 为什么比聊天 AI 更强\n\n聊天模型能写得很好，可很多任务还要碰文件、网页和代码。Agent 的差别就在这里。\n\n它需要读文件。  \n它需要查网页。  \n它需要跑代码。  \n它需要看表格。  \n它需要记住你的偏好。  \n它需要知道上一步做了什么。  \n它需要在失败后换一种办法。\n\n少一个环节，任务都可能停住。能写代码却不能运行，就不知道有没有报错；能读表格却不理解业务目标，也只能做表面统计。\n\nOpenAI 的工具文档里把 web search、file search、code interpreter、remote MCP、skills、shell、computer use 等都列为可用工具。通义灵码的智能体模式也会使用工程检索、文件编辑、终端等工具。不同平台叫法不同，但底层逻辑类似：让模型不只生成文本，而是可以调用外部能力。\n\n### 4.2 什么是上下文\n\n上下文就是 AI 做当前任务需要知道的背景。\n\n它可以包括：\n\n- 你的目标。\n- 你的偏好。\n- 你之前做过的决定。\n- 你的文件。\n- 你的项目结构。\n- 你的写作风格。\n- 你的限制条件。\n- 你的历史材料。\n\n每次从零开始，AI 就会反复猜你的偏好。\n\n比如你让 AI 帮你写文章，但不给它你的博客风格，它只能写成一种很普通的 AI 腔。你让 AI 帮你改代码，但不给它项目文件，它只能给通用建议。你让 AI 帮你设计学习计划，但不告诉它你的时间和基础，它只能给一份看起来正确但很难执行的计划。\n\n### 4.3 什么是记忆\n\n记忆是长期上下文。\n\n比如：\n\n- 我喜欢直接、温和、有一点个人感的文字。\n- 我不喜欢太商业化的表达。\n- 我正在做一套 Agent 思维教程。\n- 我平时会用 Codex 帮我写代码和整理文档。\n- 我对摄影、化妆、写作、AI 工具、个人复盘感兴趣。\n- 我希望学习计划不要太鸡血，要能落地。\n\n如果这些信息会反复用，可以写进 memory、项目说明或个人手册。以后只需补充这次任务的变化。\n\n### 4.4 什么是 skill\n\nskill 可以先理解成一份“给 AI 用的操作手册”。\n\n当某件事你会反复做，就可以把规则写下来，让 AI 以后按照这套规则执行。\n\n比如：\n\n- 每次帮我整理小红书博主资料时，要先提取账号信息、内容主题、爆款结构、视觉风格，再写总结。\n- 每次帮我写博客时，要保持口语化，不要太像营销文。\n- 每次帮我处理照片库时，要先扫描文件夹，再随机展示 9 张，再记录 star。\n- 每次帮我做旅行计划时，要先问预算、节奏、兴趣、同行人、交通限制。\n\nskill 说白了就是一份给 AI 看的操作说明。最值得写的，通常是那些你已经做过三四遍、步骤差不多、又总有几个地方容易出错的事情。\n\n### 4.5 本章练习\n\n写一份“我的 AI 使用手册”。\n\n可以包含：\n\n```text\n我的基本信息：\n\n我常做的任务：\n\n我喜欢的输出风格：\n\n我不喜欢的输出风格：\n\n我希望 AI 每次都先问的问题：\n\n我常用的检查标准：\n\n我希望沉淀成 skill 的重复任务：\n```\n\n先写一个粗糙版本就行。用过几次以后，把真正有用的规则留下，没用的删掉。\n\n## 第五章：让 AI 帮你学习\n\n### 5.1 AI 不是答案机，而是教练\n\n学习大概是 AI 最容易用歪的地方。答案来得太快，人很容易跳过自己卡住的那几分钟。\n\n我更愿意把它当成陪练：它可以出题、换一种解释、指出错误，但那一步真正的推理还是得自己走。\n\n具体可以让它做这些事：\n\n- 用不同难度解释一个概念。\n- 给你出练习题。\n- 根据错题分析薄弱点。\n- 帮你制定复习计划。\n- 用你感兴趣的例子讲知识。\n- 让你先回答，再给反馈。\n\n### 5.2 学学校科目\n\n比如学数学，不要说：\n\n```text\n这道题答案是什么？\n```\n\n可以说：\n\n```text\n请你像老师一样教我这道题。\n不要直接给答案。\n先问我看到题目后的第一反应。\n如果我卡住了，给我提示，不要一步到位。\n最后请总结这类题的解法，并出两道同类题让我练习。\n```\n\n关键是让它先听你的想法。连第一步都没尝试，AI 也不知道你究竟卡在哪里。\n\n### 5.3 学兴趣技能\n\n成年人学兴趣技能时也可以这么用。\n\n比如学摄影：\n\n```text\n我想学摄影，现在主要用手机拍照。\n我喜欢城市街景、咖啡馆、人物侧影，不太喜欢摆拍。\n请帮我设计一个 4 周练习计划。\n每周给我 3 个拍摄任务，每个任务说明练什么、怎么拍、怎么检查照片。\n```\n\n比如学化妆：\n\n```text\n我想从零开始学日常通勤妆。\n我不想一开始买太多东西，也不喜欢很浓的妆。\n请先问我肤质、预算、已有工具和想要的风格。\n然后给我一个低成本入门路线。\n```\n\n比如学投资：\n\n```text\n我想学习投资入门。\n请不要给我具体买卖建议，也不要推荐个股。\n请先从风险、资产类别、长期收益、分散配置和常见误区开始教。\n每一节后给我一个小练习，帮我检查我是否真的理解。\n```\n\n投资例子只用于学概念。具体买卖牵涉个人风险，别把决定交给模型。\n\n### 5.4 让 AI 根据你调整难度\n\n学习材料太简单会无聊，太难又容易放弃。AI 的方便之处是可以马上换一种解释，不用硬撑着读同一段话。\n\n你可以说：\n\n```text\n请用三个版本解释这个概念：\n1. 小学生能懂的版本。\n2. 高中生能懂的版本。\n3. 给成年人快速入门的版本。\n```\n\n或者：\n\n```text\n我刚才没听懂。\n请不要换一个更高级的说法，而是换一个更生活化的例子。\n```\n\n### 5.5 本章练习\n\n选择一个你想学的东西，让 AI 帮你设计一个 7 天入门计划。\n\n要求：\n\n- 每天不超过 30 分钟。\n- 每天有一个小任务。\n- 每天有一个检查方法。\n- 第 7 天做一个小作品或小总结。\n\n最后让 AI 问你：\n\n```text\n你觉得这个计划哪里太难？哪里太简单？根据我的回答重新调整。\n```\n\n## 第六章：让 AI 帮你创造作品\n\n### 6.1 创造作品是最好的学习\n\n光听概念很难知道 Agent 到底好不好用。做一个自己的东西，问题会马上冒出来。\n\n一个网页。  \n一个小游戏。  \n一个照片工具。  \n一个学习助手。  \n一个旅行计划生成器。  \n一个个人知识库。  \n一个 Excel 自动分析流程。\n\n作品不用复杂。一个只解决自己问题的小工具，通常比照着教程复刻一个“大项目”更有意思。\n\n### 6.2 为什么这对青少年很重要\n\n传统少儿编程很容易从语法开始。先学变量，再学循环，再学函数，再学项目。这个路径有价值，但很多孩子会在中间失去兴趣。\n\n可以把顺序倒过来，先问孩子想做什么。\n\n他喜欢篮球，就做篮球主页。  \n她喜欢画画，就做作品展示网站。  \n他喜欢游戏，就做一个简单小游戏。  \n她喜欢历史，就做一个历史人物问答助手。\n\n代码还是要学，只是它可以晚一点出现。孩子先看到作品能跑，再回头理解变量和函数，往往更容易知道自己为什么要学。\n\n### 6.3 一个作品的标准流程\n\n可以用这个流程：\n\n1. 说出想法。\n2. 让 AI 帮你提问。\n3. 写项目 brief。\n4. 让 AI 生成第一版。\n5. 运行或打开看看。\n6. 说出哪里不满意。\n7. 让 AI 修改。\n8. 加入自己的内容。\n9. 展示给别人看。\n10. 记录下一步想改什么。\n\n第 6 步最值得留时间。AI 的第一版往往很像模板，找出哪里不像自己、哪里不能用，才是项目真正开始的地方。\n\n### 6.4 项目一：个人主页\n\n适合青少年，也适合成年人。\n\n任务说明可以这样写：\n\n```text\n我想做一个个人主页。\n它不是简历，而是展示我这个人。\n内容包括：我是谁、我喜欢什么、我最近在做什么、我想展示的作品、联系方式。\n风格希望干净、有个人感，不要太像模板。\n请先帮我设计页面结构，再给我第一版 HTML/CSS。\n生成后告诉我怎么在本地打开。\n```\n\n完成后可以继续让 AI 修改：\n\n```text\n这个页面太像模板了。\n请让它更像一个真实的人写的页面，减少空话，增加一些生活化细节。\n颜色不要太花，字体层级更清楚一点。\n```\n\n### 6.5 项目二：本地照片浏览和收藏工具\n\n这个项目来自我自己的小麻烦：照片下载了很多，平时根本不会再翻。我想每次随机看 9 张，喜欢的就加星，慢慢把真正想留下的挑出来。\n\n目标：\n\n- 从本地照片文件夹随机展示 9 张。\n- 可以刷新下一组。\n- 可以给喜欢的照片 star。\n- 可以查看收藏列表。\n\n需求很小，但恰好适合课堂。它能让人看到，没必要等某家公司做一个功能完全对口的软件。\n\n任务说明：\n\n```text\n我想做一个本地照片浏览工具。\n它从我指定的照片文件夹里随机展示 9 张图片。\n每张图片旁边有一个 star 按钮，点了以后记录到收藏列表。\n我希望这个工具优先简单可用，可以先用本地网页实现。\n请先问我运行环境和照片路径相关问题，再给出最简单实现方案。\n```\n\n第一版只要能随机显示和收藏就够了。分类、搜索和漂亮动画都可以以后再说。\n\n### 6.6 项目三：学习助手\n\n青少年可以做“我的英语单词助手”或“我的错题练习助手”。成年人可以做“我的投资学习助手”或“我的摄影练习助手”。\n\n任务说明：\n\n```text\n我想做一个学习助手，用来帮我学习摄影。\n它需要记录我正在学的主题，每天给我一个小练习，并让我写下复盘。\n我希望它不是直接给我一堆知识，而是能引导我练习。\n请先帮我设计功能，再生成一个简单网页原型。\n```\n\n### 6.7 本章练习\n\n从下面选择一个作品，做第一版：\n\n- 个人主页。\n- 兴趣展示网站。\n- 本地照片浏览工具。\n- 学习打卡工具。\n- 旅行计划页面。\n- 小游戏。\n- AI 故事书。\n\n要求很简单：第一版能打开，能展示，能讲清楚你为什么做它。\n\n## 第七章：让 AI 帮成年人干活\n\n### 7.1 成年人常把 AI 用得太零碎\n\n很多成年人用 AI，也会卡在“局部帮忙”。\n\n写文档时，让 AI 改一段。  \n做表格时，让 AI 给一个公式。  \n写代码时，让 AI 解释一段报错。  \n做调研时，让 AI 总结一篇文章。\n\n问题不在这些小用法，而在每次都从头开始。如果一件事每周都做，值得把步骤和检查标准留下来。\n\n### 7.2 Excel 和数据\n\n处理表格时，不要一上来就问“帮我分析”。更好的流程是：\n\n1. 说明业务目标。\n2. 让 AI 检查字段。\n3. 让 AI 找缺失值和异常值。\n4. 让 AI 提出分析维度。\n5. 人确认哪些维度有意义。\n6. 让 AI 生成统计、图表或公式。\n7. 人检查结论是否符合常识。\n8. 让 AI 写成报告。\n\n通用 prompt：\n\n```text\n我需要分析一份表格。\n请不要直接下结论。\n先帮我检查字段含义、缺失值、异常值和可能的分析维度。\n然后给我一个分析计划。\n等我确认后，再开始计算或写公式。\n最后输出一份可以给同事看的摘要。\n```\n\n### 7.3 文档和汇报\n\n文档工作通常材料多、步骤重复，很适合先整理成流程。\n\n比如：\n\n- 会议纪要。\n- 项目周报。\n- 竞品调研。\n- 课程大纲。\n- 招生文案。\n- 个人复盘。\n- 读书笔记。\n\n比如可以这样做：\n\n1. 收集原始材料。\n2. 让 AI 先提炼信息结构。\n3. 让 AI 找缺口。\n4. 人补充背景。\n5. AI 写初稿。\n6. 人指出风格问题。\n7. AI 改写。\n8. AI 自查是否有空话、重复、逻辑跳跃。\n\n### 7.4 软件开发和小工具\n\nAI Coding Agent 降低了做小工具的门槛。你不必先把前端、后端和数据库全学完，很多个人需求可以从本地网页或脚本开始。\n\n比如：\n\n- 批量重命名文件。\n- 整理下载文件夹。\n- 做照片浏览器。\n- 把 CSV 生成图表。\n- 做一个个人账本。\n- 做一个旅行计划页面。\n- 做一个课程资料整理工具。\n\n使用 Codex 或类似工具时，可以这样开头：\n\n```text\n请先阅读这个项目结构，告诉我它是什么技术栈。\n我想增加一个功能：……\n请先给出修改计划，不要直接改。\n计划里说明要改哪些文件、为什么改、怎么验证。\n等我确认后再执行。\n```\n\n### 7.5 把重复工作沉淀成 skill\n\n看到重复工作时，先别急着自动化。可以检查它是否真的稳定：\n\n判断一个任务是否适合变成 skill，可以问：\n\n- 这件事我是不是做过三次以上？\n- 每次步骤是不是差不多？\n- 判断标准是不是能写出来？\n- 输入和输出是不是相对固定？\n- 如果 AI 帮我做 70%，我是否愿意人工检查剩下 30%？\n\n大部分答案是“是”，再把它写成 skill 或工作流。判断特别多、每次情况差异很大的任务，硬自动化反而麻烦。\n\n### 7.6 本章练习\n\n列出你工作或生活中最重复的 5 件事。\n\n每件事写：\n\n- 输入是什么。\n- 输出是什么。\n- 中间步骤是什么。\n- 哪些地方必须人判断。\n- 哪些地方可以交给 AI。\n\n然后选一个，写成一份 skill 草稿。\n\n## 第八章：Agent 工作流\n\n### 8.1 不要一开始追求全自动\n\n很多人听到 Agent，会想象一个完全自动的 AI：你说一句话，它自己全做完。\n\n完全自动听起来很省事，可任务一旦碰到钱、隐私、删除文件或对外发布，人就得留在流程里。\n\n初学时先做可控的工作流更实际。\n\n工作流只是把步骤写清楚。哪里自动，哪里停下来等人确认，也一起写进去。\n\n### 8.2 提示链\n\n提示链就是一步接一步。\n\n例子：\n\n1. 先写大纲。\n2. 检查大纲。\n3. 根据大纲写初稿。\n4. 检查初稿。\n5. 润色。\n6. 输出最终版。\n\n适合写文章、写方案、做课程、做报告。\n\nprompt：\n\n```text\n请不要一次性写完。\n我们按链式流程来：\n第一步只输出大纲。\n等我确认后，再写正文。\n正文写完后，再单独做一次自查和润色。\n```\n\n### 8.3 路由\n\n路由就是先判断类型，再交给不同处理方式。\n\n比如你有很多用户反馈：\n\n- 有些是 bug。\n- 有些是功能建议。\n- 有些是投诉。\n- 有些是表扬。\n\n你可以让 AI 先分类，再分别处理。\n\n生活里也可以用：\n\n- 学习问题交给学习教练。\n- 写作问题交给写作编辑。\n- 技术问题交给工程助手。\n- 情绪复盘交给反思助手。\n\n### 8.4 并行\n\n并行就是让 AI 同时给多个方案。\n\n比如：\n\n```text\n请给我三个不同方向的个人主页设计：\n1. 极简文字型。\n2. 摄影作品集型。\n3. 轻博客型。\n每个方案说明适合什么人、优点、缺点。\n```\n\n创作时先看几个方向，能避免被 AI 的第一个答案带着走。\n\n### 8.5 指挥者-执行者\n\n任务变复杂以后，可以把拆解和执行分开。\n\n一个“指挥者”负责拆任务、安排顺序、汇总结果。多个“执行者”负责具体子任务。\n\n比如做一个课程：\n\n- 指挥者：设计整体结构。\n- 执行者 A：调研公开资料。\n- 执行者 B：写青少年案例。\n- 执行者 C：写成年人案例。\n- 执行者 D：检查语言是否太 AI。\n\n你不一定真的开多个 Agent，也可以在一个对话里模拟这个流程。\n\n### 8.6 评审-优化\n\n评审和修改是最常用的一组动作。\n\n一个 AI 负责生成，另一个视角负责挑问题。或者同一个 AI 先生成，再切换成审稿人。\n\nprompt：\n\n```text\n请先作为作者写第一版。\n写完后，切换成挑剔但友好的审稿人，检查：\n1. 有没有空话。\n2. 有没有逻辑跳跃。\n3. 有没有太像 AI 的句子。\n4. 有没有读者看不懂的术语。\n5. 有没有可以删掉的段落。\n最后根据审稿意见给出第二版。\n```\n\n### 8.7 本章练习\n\n用“评审-优化”流程改一篇你自己的文字。\n\n要求 AI 先指出问题，不要急着重写。你确认哪些建议有用后，再让它改。\n\n如果 AI 的评审意见不成立，也要明确拒绝。它是帮手，不是裁判。\n\n## 第九章：安全、边界和判断\n\n### 9.1 AI 会犯错\n\nAI 很有用，但它会犯错。\n\n它会编不存在的资料。  \n它会算错。  \n它会误解你的意思。  \n它会把看起来合理的话写得很自信。  \n它会在没有足够信息时假装知道。\n\n所以检查不能留到最后随便看一眼。最好在任务开始前就想好怎么验收。\n\n### 9.2 哪些事情必须小心\n\n以下场景要特别谨慎：\n\n- 隐私数据。\n- 身份证、手机号、家庭住址、银行卡。\n- 公司内部资料。\n- 未公开商业信息。\n- 医疗、法律、投资等高风险决策。\n- 自动删除、批量发送、付款、下单。\n- 学校作业和考试。\n\n这些任务可以让 AI 帮忙整理和起草，但最终决定、发送和付款都要由人确认。\n\n### 9.3 三条基本规则\n\n第一，重要事实要查来源。\n\n不要因为 AI 写得像真的，就当成真的。涉及数据、政策、价格、法律、医学、新闻，都要查来源。\n\n第二，重要操作要人确认。\n\n让 Agent 改文件、发邮件、删数据、执行命令之前，人要知道它要做什么。\n\n第三，学习任务要保留自己的思考。\n\nAI 可以讲解、提示、出题、检查，但不要直接替你完成应该由你完成的作业。\n\n### 9.4 给青少年的边界\n\n青少年使用 AI 时，规则要说得具体。\n\n可以做：\n\n- 让 AI 解释知识。\n- 让 AI 出练习题。\n- 让 AI 检查草稿。\n- 让 AI 帮自己做作品。\n- 让 AI 提醒哪里需要验证。\n\n不应该做：\n\n- 直接让 AI 代写作业。\n- 上传同学或家庭隐私。\n- 完全相信 AI 给出的事实。\n- 在没有大人知道的情况下使用涉及钱或账号的工具。\n\n### 9.5 给成年人的边界\n\n成年人更容易在“省时间”的诱惑下跳过检查。\n\nAI 写的报告，要看。  \nAI 算的数据，要复核。  \nAI 写的代码，要跑。  \nAI 给的投资知识，可以学，但不能当成买卖建议。  \nAI 帮你处理公司资料，要注意保密。\n\n报告、代码和数据都可以让 AI 起草或处理，但责任不会因此转给模型。\n\n### 9.6 本章练习\n\n写一份你的 AI 使用边界。\n\n```text\n我可以让 AI 帮我做：\n\n我暂时不让 AI 做：\n\n涉及隐私时，我会：\n\n涉及钱、健康、法律时，我会：\n\nAI 输出重要结论时，我会如何检查：\n```\n\n写完后放在常用项目里。真正遇到敏感资料或自动操作时，再拿出来对照。\n\n## 第十章：最终项目\n\n### 10.1 为什么要有最终项目\n\n最后还是要做一个自己的项目。只听懂概念，很难知道自己会在哪一步卡住。\n\n项目不用大，满足下面几点就够：\n\n- 它来自真实需求。\n- 它能展示或能使用。\n- 它包含一次人和 AI 的迭代过程。\n\n### 10.2 青少年项目方向\n\n可以选择：\n\n- 我的个人主页。\n- 我的兴趣展示网站。\n- 我的 AI 故事书。\n- 我的学习助手。\n- 我的小游戏。\n- 我的班级知识问答页面。\n- 我的旅行计划页面。\n\n最终交付：\n\n- 作品链接或截图。\n- 项目说明。\n- 我怎么和 AI 说需求。\n- AI 第一版哪里不好。\n- 我怎么让 AI 修改。\n- 我学到了什么。\n\n### 10.3 成年人项目方向\n\n可以选择：\n\n- 我的 Excel 分析流程。\n- 我的工作周报助手。\n- 我的旅行计划工作流。\n- 我的个人复盘助手。\n- 我的照片整理工具。\n- 我的资料总结 skill。\n- 我的代码开发助手。\n\n最终交付：\n\n- 工作流说明。\n- 输入和输出。\n- 可复用 prompt 或 skill。\n- 检查清单。\n- 节省了什么时间。\n- 哪些步骤仍然需要人判断。\n\n### 10.4 项目模板\n\n```text\n项目名称：\n\n我为什么想做它：\n\n这个项目给谁用：\n\n我希望它能完成什么：\n\n我已有的材料：\n\n我使用的 AI 工具：\n\n我给 AI 的第一版任务说明：\n\nAI 给出的第一版结果：\n\n我发现的问题：\n\n我让 AI 怎么修改：\n\n最终结果：\n\n我怎么检查它：\n\n下一步想改进：\n```\n\n### 10.5 课程结束以后\n\n今天用的是 Codex、ChatGPT、Gemini、DeepSeek 或 GLM，过一阵子工具名单还会变。课程里那些按钮和菜单不一定耐用。\n\n更值得留下的是做项目时形成的习惯：需求写清楚，计划先看，结果自己验收；一件事做顺以后，把步骤留给下次。孩子可以用这套习惯做作品，成年人可以少做一些重复劳动。\n\n课程结束后，不妨继续维护自己的 AI 使用手册。过几个月再回来看，删掉没用的规则，补上新踩过的坑。这比收藏一百条“万能 prompt”更接近真实使用。\n","abstract":"# 和 AI Agent 一起做事\n\n## 一门教人把 AI 用到具体事情里的课\n\n我身边不少朋友已经在用 ChatGPT、Gemini、豆包或 DeepSeek。平时让它改改文字、查点资料，偶尔也拿来问代码。可一到稍微完整一点的任务，他们还是会把工作切成很多小段，一句一句地喂给 AI。\n\n我教他们用 Codex 时，最明显的变化不在模型，而在用法。AI 可以先读项目、列计划，再改文件、跑命令、看报错。处理表格、整理资料、做旅行计划也是类似的。你可以把整件事交代清楚，让它连续做一段，而不是每次只问一句。\n\n这门课想把这种用法讲明白。\n\n## 谁可以来学\n\n年龄不是主要门槛。\n\n青少年可以做自己的网页、小游戏、故事书和学习助手。成年人更可能拿它处理 Excel、写报告、整理资料，或者搭一个只有自己会用的小工具。家长和老师则需要弄清楚另一件事：孩子用 AI，重点不该是抄答案，而是学会描述想法、看懂结果，并且愿意把第一版改掉重来。\n\n不要求会编程。会用电脑、手上有一件想做的事，就够开始了。\n\n## 课里会做什么\n\n我们会练习怎样把一个含糊的念头说清楚，怎样让 AI 先问问题、列计划，再开始执行。还会接触文件、表格、代码和浏览器这些工具，但不会一上来堆术语。\n\n课里的项目会尽量贴近生活：个人主页、照片浏览器、旅行计划、学习助手、Excel 分析流程，都可以。选什么项目不重要，重要的是你真的需要它，也愿意检查 AI 做出来的东西。\n\n我们还会讨论几个不太舒服但绕不开的问题：AI 会胡说怎么办？哪些资料不能上传？什么时候应该让它停下来？作业和工作成果的责任算谁的？\n\n## 一个简单例子\n\n很多人会这样问：\n\n```text\n帮我做一个网页。\n```\n\n如果这是你自己的项目，可以多交代几句：\n\n```text\n我想做一个个人主页，放摄影作品和最近写的文章。\n主要给朋友和可能合作的人看。\n页面需要自我介绍、作品区、博客链接和联系方式。\n我喜欢干净一点的排版，不想做得像公司官网。\n\n先别急着写代码。请检查我还漏了什么，问完问题后再列一个实现计划。\n```\n\n第二种写法没有什么玄学。你只是把真实情况告诉了 AI，也给自己留了一个确认计划的机会。\n\n## 十章内容\n\n1. AI 不只是聊天机器人\n2. 把想法说清楚\n3. 先问问题，再计划和执行\n4. 工具、上下文、记忆和 skill\n5. 用 AI 学习学校科目和兴趣技能\n6. 用 AI 做网页、小工具和其他作品\n7. 用 AI 处理表格、文档和重复工作\n8. 几种常见的 Agent 工作流\n9. 安全、隐私和人的责任\n10. 完成并展示一个自己的项目\n\n这门课最后希望留下的，不是某个软件的操作步骤。软件更新太快，半年后菜单可能就变了。更耐用的是一套做事习惯：任务先说清楚，计划先看一遍，结果自己验收，做顺的流程再留下来下次用。\n","prompts":"# Agent Thinking 101 Prompt 与 Skill 模板库\n\n这些模板可以直接复制，但别把它们当咒语。先填进自己的目标、材料和限制。用过几次后，删掉多余的问题，留下每次都会用到的部分。\n\n## 1. 通用任务说明模板\n\n适合几乎所有任务。\n\n```text\n我想完成：\n\n背景是：\n\n这个结果给谁用/给谁看：\n\n我已有的材料：\n\n限制条件：\n\n我希望最后输出：\n\n怎样算做好：\n\n请你先检查我的描述是否清楚。如果不清楚，先问我问题，不要急着开始做。\n```\n\n## 2. Agent 式协作流程模板\n\n适合写代码、写文档、做数据、做项目。\n\n```text\n请按这个流程帮我：\n\n1. 先复述你理解的目标。\n2. 再问我 3 到 5 个必要问题。\n3. 然后给出执行计划。\n4. 等我确认后，只执行第一步。\n5. 每一步结束后告诉我怎么检查结果。\n6. 如果遇到不确定的地方，请明确说出你的假设。\n7. 完成后总结这次任务可以沉淀成什么经验。\n```\n\n## 3. 让 AI 先问问题\n\n适合需求还不清楚的时候。\n\n```text\n我现在只有一个模糊想法：\n\n……\n\n请不要直接给方案。\n请先像一个有经验的项目顾问一样，问我 8 个关键问题。\n这些问题要帮助我澄清目标、用户、材料、限制、风格、成功标准和风险。\n问完后，等我回答，再帮我整理成任务说明。\n```\n\n## 4. 把想法变成项目 brief\n\n适合青少年作品、个人项目、小工具、课程项目。\n\n```text\n请帮我把下面这个想法整理成项目 brief：\n\n想法：\n\n……\n\n请输出：\n1. 项目名称。\n2. 这个项目解决什么问题。\n3. 给谁使用。\n4. 核心功能。\n5. 第一版最小可行范围。\n6. 需要我补充的材料。\n7. 可能遇到的困难。\n8. 第一版验收标准。\n```\n\n## 5. 做个人主页\n\n适合青少年、成年人、创作者、求职者。\n\n```text\n我想做一个个人主页。\n\n它不是简历，而是展示我这个人。\n\n我的身份/兴趣：\n\n我想展示的内容：\n\n目标读者：\n\n我喜欢的风格：\n\n我不喜欢的风格：\n\n请先帮我设计页面结构，再问我还缺哪些内容。\n等我确认后，再生成第一版 HTML/CSS。\n生成后请告诉我怎么在本地打开，以及如何检查页面有没有问题。\n```\n\n## 6. 做兴趣展示网站\n\n适合孩子的作品课。\n\n```text\n我想做一个关于【兴趣】的网站。\n\n这个网站主要给【同学/家长/朋友】看。\n\n我希望包含：\n- 我为什么喜欢它。\n- 我最喜欢的作品/人物/案例。\n- 我自己的经历或练习记录。\n- 我想继续学习的方向。\n\n我的技术基础是：\n\n页面风格希望：\n\n请先帮我拆成 3 到 5 个页面模块，然后问我还需要补充什么。\n```\n\n## 7. 做学习助手\n\n适合学校科目、兴趣学习、成年人自学。\n\n```text\n我想做一个学习助手，用来帮我学习：\n\n我的基础：\n\n我每周能投入的时间：\n\n我容易卡住的地方：\n\n我希望它帮我：\n- 制定计划。\n- 出练习。\n- 检查我的回答。\n- 根据错误调整难度。\n- 做阶段复盘。\n\n请先帮我设计这个学习助手的工作方式。\n不要直接开始讲课。\n```\n\n## 8. 让 AI 像老师一样讲题\n\n适合学生，不适合直接代写。\n\n```text\n请你像老师一样教我这道题。\n\n要求：\n1. 不要直接给最终答案。\n2. 先问我看到题目后的想法。\n3. 如果我答错，先指出错在哪里。\n4. 如果我卡住，只给一个小提示。\n5. 最后总结这类题的解法。\n6. 再出 2 道同类题让我练习。\n\n题目是：\n\n……\n```\n\n## 9. 设计 7 天学习计划\n\n适合兴趣学习、技能入门。\n\n```text\n我想在 7 天内入门：\n\n我的基础是：\n\n我每天最多能花：\n\n我希望第 7 天能完成一个小作品或小总结。\n\n请帮我设计 7 天计划。\n每天包括：\n1. 今天学什么。\n2. 一个 30 分钟以内的小任务。\n3. 怎么检查我有没有学会。\n4. 如果太难，可以怎么降低难度。\n```\n\n## 10. 学投资的安全模板\n\n只用于知识学习，不用于具体投资建议。\n\n```text\n我想学习投资入门。\n\n请注意：\n1. 不要推荐具体股票、基金或买卖时点。\n2. 不要替我做投资决策。\n3. 请把重点放在基础知识、风险意识、资产类别、长期收益、分散配置和常见误区。\n4. 每讲一个概念，都给一个生活化例子。\n5. 每节最后给我 3 个问题，检查我是否理解。\n\n请先问我当前基础和学习目标，再设计入门路线。\n```\n\n## 11. 处理 Excel 或 CSV\n\n适合成年人工作流。\n\n```text\n我需要分析一份表格。\n\n业务目标是：\n\n表格字段大概包括：\n\n我希望得到：\n\n请不要直接下结论。\n请先帮我：\n1. 检查字段含义。\n2. 判断可能的缺失值和异常值。\n3. 提出 3 到 5 个分析维度。\n4. 告诉我每个维度为什么有意义。\n5. 等我确认后，再开始计算或写公式。\n\n最后请输出一份可以给同事看的摘要，并说明哪些结论需要人工复核。\n```\n\n## 12. 写工作报告\n\n适合周报、项目汇报、调研报告。\n\n```text\n我需要写一份报告。\n\n报告类型：\n\n读者：\n\n目标：\n\n已有材料：\n\n希望语气：\n\n请按流程来：\n1. 先提炼材料里的关键信息。\n2. 再指出缺少哪些信息。\n3. 给出报告结构。\n4. 等我确认后再写初稿。\n5. 初稿完成后，检查空话、重复、逻辑跳跃和读者看不懂的地方。\n```\n\n## 13. 用 Codex 改项目\n\n适合 AI Coding Agent。\n\n```text\n请先阅读当前项目结构。\n\n我的目标是：\n\n请先不要直接修改文件。\n\n请先告诉我：\n1. 这个项目大概是什么技术栈。\n2. 与目标最相关的文件有哪些。\n3. 你建议怎么改。\n4. 每一步怎么验证。\n5. 可能的风险是什么。\n\n等我确认后，再开始实施。\n```\n\n## 14. 让 AI 修 bug\n\n适合代码报错、网页问题、小工具问题。\n\n```text\n我遇到了一个问题：\n\n现象：\n\n我期望的结果：\n\n实际结果：\n\n相关报错：\n\n我已经尝试过：\n\n请不要直接猜原因。\n请先根据现象列出 3 个可能原因，并告诉我如何验证每个原因。\n然后从最可能、成本最低的验证开始。\n```\n\n## 15. 做本地照片浏览工具\n\n适合展示“AI 帮我做自己的小工具”。\n\n```text\n我想做一个本地照片浏览工具。\n\n目标：\n- 从指定照片文件夹里随机展示 9 张图片。\n- 可以刷新下一组。\n- 可以给喜欢的照片 star。\n- 可以查看收藏列表。\n\n我的运行环境：\n\n照片文件夹路径：\n\n我希望第一版尽量简单可用，不追求复杂功能。\n\n请先问我必要问题，再给出最小实现方案。\n如果需要写代码，请告诉我怎么运行、怎么检查、可能会遇到什么权限问题。\n```\n\n## 16. 做旅行计划\n\n适合普通人快速理解 Agent 思维。\n\n```text\n我想做一个旅行计划。\n\n目的地：\n\n天数：\n\n同行人：\n\n预算：\n\n喜欢：\n\n不喜欢：\n\n节奏偏好：\n\n必须去/必须避开的地方：\n\n请先问我还缺哪些信息。\n然后按每天上午、下午、晚上设计路线。\n每个安排都说明为什么适合我。\n最后给出一个可以调整的清单，而不是一份死板攻略。\n```\n\n## 17. 个人复盘和自我理解\n\n适合整理博客、日记、随想、人生经历。\n\n```text\n我会给你一些关于我的材料，包括经历、随想、博客或日记片段。\n\n请你不要急着评价我。\n\n请帮我做一份温和、诚实的自我观察：\n1. 我反复关心的主题。\n2. 我的优势。\n3. 我容易卡住的地方。\n4. 我最近可能在逃避或拖延什么。\n5. 我可以继续发展成项目的线索。\n6. 你不确定但值得我思考的问题。\n\n请把结论和证据分开写。\n不要把猜测写得太确定。\n```\n\n## 18. 评审-优化\n\n适合文章、报告、课程、网页、prompt。\n\n```text\n请先作为作者/执行者给出第一版。\n\n完成后，请切换成挑剔但友好的评审，检查：\n1. 有没有空话。\n2. 有没有逻辑跳跃。\n3. 有没有太像 AI 的句子。\n4. 有没有读者看不懂的术语。\n5. 有没有可以删掉的段落。\n6. 有没有缺少例子。\n7. 有没有事实需要验证。\n\n请先列出评审意见。\n等我确认哪些意见要采纳后，再改第二版。\n```\n\n## 19. 把重复任务写成 skill 草稿\n\n适合沉淀个人工作流。\n\n```text\n我想把一个重复任务写成 skill 草稿。\n\n任务名称：\n\n我为什么经常做它：\n\n输入通常是什么：\n\n输出应该是什么：\n\n标准步骤：\n\n判断标准：\n\n容易出错的地方：\n\n哪些步骤可以 AI 做：\n\n哪些步骤必须人确认：\n\n请帮我整理成一份给 AI 使用的操作手册。\n要求清晰、可复用、不要写成泛泛建议。\n```\n\n## 20. 让 AI 总结经验\n\n适合每次任务结束后沉淀。\n\n```text\n请总结这次协作。\n\n请包括：\n1. 我一开始的目标是什么。\n2. 我们实际完成了什么。\n3. 中间遇到什么问题。\n4. 哪些 prompt 或流程有效。\n5. 下次可以复用什么。\n6. 如果要写成 skill，应该包含哪些规则。\n7. 我作为使用者哪里可以说得更清楚。\n```\n\n## 21. Prompt 使用原则\n\n模板只是一个起点。检查下面几项有没有说清楚：\n\n- 目标。\n- 背景。\n- 材料。\n- 约束。\n- 成功标准。\n- 检查方式。\n\nprompt 写得长不代表任务清楚。反过来，背景已经明确时，几句话也够用。\n\n## 22. Skill 草稿示例：旅行计划助手\n\n```text\n技能名称：旅行计划助手\n\n用途：\n帮助用户根据目的地、预算、兴趣、同行人和节奏偏好，制定可调整的旅行计划。\n\n工作流程：\n1. 先询问目的地、时间、同行人、预算、兴趣和禁忌。\n2. 不要直接生成攻略。\n3. 先总结用户偏好。\n4. 给出 2 到 3 种旅行节奏方案。\n5. 用户选择后，再按天安排上午、下午、晚上。\n6. 每个安排说明原因。\n7. 最后输出可调整清单。\n\n检查标准：\n- 路线不要太赶。\n- 安排要符合用户兴趣。\n- 不确定的营业时间、票价和交通信息要提示用户查证。\n- 不替用户做涉及付款的操作。\n```\n\n## 23. Skill 草稿示例：个人写作编辑\n\n```text\n技能名称：个人写作编辑\n\n用途：\n帮助用户把口语化想法整理成博客、课程文案或长文，但保留真实感。\n\n风格规则：\n- 不要太营销。\n- 不要堆概念。\n- 少用口号。\n- 保留一点个人观察和犹豫。\n- 句子可以短一点。\n- 先讲真实场景，再讲抽象概念。\n\n工作流程：\n1. 先提炼原始材料里的核心观点。\n2. 问用户目标读者是谁。\n3. 给 2 到 3 个切入角度。\n4. 等用户选方向后再写初稿。\n5. 写完后检查 AI 腔、空话、重复和逻辑跳跃。\n```\n\n## 24. Skill 草稿示例：学习教练\n\n```text\n技能名称：学习教练\n\n用途：\n帮助用户学习一个新领域，但不直接替用户完成应该自己完成的作业。\n\n工作流程：\n1. 先询问学习目标、当前基础、可投入时间和截止时间。\n2. 把目标拆成阶段。\n3. 每个阶段给小任务和检查方法。\n4. 用户回答后再反馈。\n5. 如果用户卡住，先给提示，不直接给最终答案。\n6. 每周做一次复盘。\n\n边界：\n- 不代写作业。\n- 不替用户做高风险决策。\n- 涉及投资、医学、法律时，只做知识解释，并提醒查专业来源。\n```\n"};

<script>
const docs = [
  {
    id: "course",
    title: "完整手册",
    kind: "Handbook",
    path: "../docs/agent-thinking-course.md",
  },
  {
    id: "abstract",
    title: "快速摘要",
    kind: "Overview",
    path: "../docs/agent-thinking-abstract.md",
  },
  {
    id: "prompts",
    title: "Prompt / Skill 模板",
    kind: "Templates",
    path: "../docs/agent-thinking-prompt-library.md",
  },
];

const state = {
  activeDoc: docs[0],
  cache: new Map(),
  currentMarkdown: "",
  currentHeadings: [],
};

const els = {
  siteHeader: document.querySelector(".site-header"),
  navToggle: document.querySelector("#navToggle"),
  docList: document.querySelector("#docList"),
  currentKind: document.querySelector("#currentKind"),
  currentTitle: document.querySelector("#currentTitle"),
  docContent: document.querySelector("#docContent"),
  toc: document.querySelector("#toc"),
  searchInput: document.querySelector("#searchInput"),
};

function setNavigationOpen(isOpen) {
  els.siteHeader.classList.toggle("nav-open", isOpen);
  els.navToggle.setAttribute("aria-expanded", String(isOpen));
  els.navToggle.setAttribute("aria-label", isOpen ? "收起文档导航" : "展开文档导航");
}

function escapeHtml(value) {
  return value
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function slugify(text, index) {
  const slug = text
    .trim()
    .toLowerCase()
    .replace(/[^\p{L}\p{N}]+/gu, "-")
    .replace(/^-|-$/g, "");
  return slug || `section-${index}`;
}

function normalizeUrl(url) {
  const embeddedAssets = window.__EMBEDDED_ASSETS__ || {};
  if (embeddedAssets[url]) return embeddedAssets[url];
  if (url.startsWith("assets/") && embeddedAssets[`/docs/${url}`]) return embeddedAssets[`/docs/${url}`];
  if (url.startsWith("/docs/assets/") && embeddedAssets[url]) return embeddedAssets[url];
  if (/^(https?:|mailto:|#|data:)/.test(url)) return url;
  if (url.startsWith("/docs/")) return `..${url}`;
  if (url.startsWith("docs/")) return `../${url}`;
  if (url.startsWith("assets/")) return `../docs/${url}`;
  return url;
}

function inlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
    return `<img src="${normalizeUrl(url)}" alt="${alt}">`;
  });
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    return `<a href="${normalizeUrl(url)}" target="_blank" rel="noreferrer">${label}</a>`;
  });
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  return html;
}

function parseMarkdown(markdown, query = "") {
  const lines = markdown.split(/\r?\n/);
  const html = [];
  const headings = [];
  let inCode = false;
  let codeLines = [];
  let inList = false;
  let inOrderedList = false;
  let paragraph = [];
  let headingIndex = 0;

  function flushParagraph() {
    if (!paragraph.length) return;
    html.push(`<p>${inlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph = [];
  }

  function closeLists() {
    if (inList) {
      html.push("</ul>");
      inList = false;
    }
    if (inOrderedList) {
      html.push("</ol>");
      inOrderedList = false;
    }
  }

  for (const rawLine of lines) {
    const line = rawLine.replace(/\s+$/, "");

    if (line.startsWith("```")) {
      if (inCode) {
        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        codeLines = [];
        inCode = false;
      } else {
        flushParagraph();
        closeLists();
        inCode = true;
      }
      continue;
    }

    if (inCode) {
      codeLines.push(rawLine);
      continue;
    }

    const headingMatch = line.match(/^(#{1,3})\s+(.+)$/);
    if (headingMatch) {
      flushParagraph();
      closeLists();
      const level = headingMatch[1].length;
      const title = headingMatch[2].trim();
      const id = slugify(title, headingIndex++);
      headings.push({ level, title, id });
      html.push(`<h${level} id="${id}">${inlineMarkdown(title)}</h${level}>`);
      continue;
    }

    if (!line.trim()) {
      flushParagraph();
      closeLists();
      continue;
    }

    if (line.startsWith("> ")) {
      flushParagraph();
      closeLists();
      html.push(`<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`);
      continue;
    }

    const unorderedMatch = line.match(/^\s*[-*]\s+(.+)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (inOrderedList) {
        html.push("</ol>");
        inOrderedList = false;
      }
      if (!inList) {
        html.push("<ul>");
        inList = true;
      }
      html.push(`<li>${inlineMarkdown(unorderedMatch[1])}</li>`);
      continue;
    }

    const orderedMatch = line.match(/^\s*\d+\.\s+(.+)$/);
    if (orderedMatch) {
      flushParagraph();
      if (inList) {
        html.push("</ul>");
        inList = false;
      }
      if (!inOrderedList) {
        html.push("<ol>");
        inOrderedList = true;
      }
      html.push(`<li>${inlineMarkdown(orderedMatch[1])}</li>`);
      continue;
    }

    paragraph.push(line);
  }

  flushParagraph();
  closeLists();

  let output = html.join("\n");
  if (query.trim()) {
    const escaped = query.trim().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    output = output.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
  }

  return { html: output, headings };
}

async function getMarkdown(doc) {
  const embeddedDocs = window.__EMBEDDED_DOCS__ || {};
  if (embeddedDocs[doc.id]) {
    return embeddedDocs[doc.id];
  }
  if (state.cache.has(doc.id)) return state.cache.get(doc.id);
  if (window.location.protocol === "file:") {
    throw new Error(
      "浏览器不允许 file:// 页面读取 docs/*.md。请打开 site/standalone.html，或在项目根目录运行 bash site/start.sh 后访问 http://127.0.0.1:4173/site/。",
    );
  }
  const response = await fetch(doc.path);
  if (!response.ok) {
    throw new Error(`无法读取 ${doc.path}`);
  }
  const markdown = await response.text();
  state.cache.set(doc.id, markdown);
  return markdown;
}

function renderDocList() {
  els.docList.innerHTML = docs
    .map(
      (doc) => `
        <button class="doc-button ${doc.id === state.activeDoc.id ? "active" : ""}" data-doc="${doc.id}">
          <strong>${doc.title}</strong>
        </button>
      `,
    )
    .join("");

  els.docList.querySelectorAll(".doc-button").forEach((button) => {
    button.addEventListener("click", () => {
      const doc = docs.find((item) => item.id === button.dataset.doc);
      setNavigationOpen(false);
      setActiveDoc(doc);
    });
  });
}

function renderToc(headings) {
  const visible = headings.filter((heading) => heading.level >= 1 && heading.level <= 3);
  els.toc.innerHTML = visible.length
    ? visible
        .map(
          (heading) =>
            `<a class="toc-link level-${heading.level}" href="#${heading.id}">${escapeHtml(heading.title)}</a>`,
        )
        .join("")
    : "<p>当前文档没有可提取的章节。</p>";
}

async function setActiveDoc(doc) {
  state.activeDoc = doc;
  els.searchInput.value = "";
  renderDocList();
  els.currentKind.textContent = doc.kind;
  els.currentTitle.textContent = doc.title;
  els.docContent.innerHTML = "<p>正在读取文档...</p>";

  try {
    state.currentMarkdown = await getMarkdown(doc);
    const parsed = parseMarkdown(state.currentMarkdown);
    state.currentHeadings = parsed.headings;
    els.docContent.innerHTML = parsed.html;
    renderToc(parsed.headings);
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (error) {
    els.docContent.innerHTML = `<p>${escapeHtml(error.message)}</p>`;
    els.toc.innerHTML = "";
  }
}

function setupSearch() {
  els.searchInput.addEventListener("input", () => {
    const parsed = parseMarkdown(state.currentMarkdown, els.searchInput.value);
    els.docContent.innerHTML = parsed.html;
    renderToc(parsed.headings);
  });
}

function setupNavigation() {
  els.navToggle.addEventListener("click", () => {
    setNavigationOpen(!els.siteHeader.classList.contains("nav-open"));
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") setNavigationOpen(false);
  });

  window.addEventListener("resize", () => {
    if (window.innerWidth > 860) setNavigationOpen(false);
  });
}

renderDocList();
setupSearch();
setupNavigation();
setActiveDoc(state.activeDoc);

</script>
  </body>
</html>
